name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Build
        run: npm run build
      
      - name: Unit tests
        run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Start test services
        run: docker compose -f docker-compose.test.yml up -d
      
      - name: Wait for services
        run: |
          echo "Waiting for Pinchtab to be ready..."
          for i in {1..60}; do
            if curl -s -H "Authorization: Bearer test-token" http://127.0.0.1:19867/health | grep -q '"status":"ok"'; then
              echo "Pinchtab is ready!"
              exit 0
            fi
            echo "Attempt $i/60 - waiting..."
            sleep 1
          done
          echo "Timeout waiting for Pinchtab"
          exit 1
      
      - name: Integration tests
        run: npm run test:integration
        env:
          PINCHTAB_URL: http://127.0.0.1:19867
          PINCHTAB_TOKEN: test-token
      
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down
